name: Control Plane Diagnostics

on:
  workflow_dispatch:
    inputs:
      lines:
        description: Number of deploy log lines to fetch.
        required: false
        default: '120'
        type: string

permissions:
  contents: read

env:
  RAILWAY_CONTROL_PLANE_SERVICE: remote-codex-control-plane
  RAILWAY_ENVIRONMENT: production

jobs:
  logs:
    name: Fetch control-plane logs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Set up Node for Railway CLI
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch recent control-plane logs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RAILWAY_TOKEN}" ]]; then
            echo "RAILWAY_TOKEN secret is not configured." >&2
            exit 1
          fi
          npm install -g @railway/cli
          railway status --json || true
          railway logs \
            --service "${RAILWAY_CONTROL_PLANE_SERVICE}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --latest \
            --lines "${{ inputs.lines }}" \
            --json

      - name: Fetch recent control-plane HTTP 5xx logs
        shell: bash
        run: |
          set -euo pipefail
          railway logs \
            --service "${RAILWAY_CONTROL_PLANE_SERVICE}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --http \
            --status "500..599" \
            --since 30m \
            --json || true
