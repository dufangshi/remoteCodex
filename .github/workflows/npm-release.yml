name: Publish npm package

on:
  push:
    branches:
      - main
    paths:
      - 'apps/relay-server/**'
      - 'apps/supervisor-api/**'
      - 'apps/supervisor-web/**'
      - 'bin/**'
      - 'config/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/npm-release.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.5.1

      - name: Configure thread-ui package access
        env:
          REMOTE_CODEX_THREAD_UI_DEPLOY_KEY_B64: ${{ secrets.REMOTE_CODEX_THREAD_UI_DEPLOY_KEY_B64 }}
        run: bash scripts/setup-thread-ui-git-auth.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require an unpublished package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if npm view "remote-codex@${version}" version >/dev/null 2>&1; then
            echo "remote-codex@${version} is already published. Bump package.json when package/runtime files change." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate publishable package
        run: |
          set -euo pipefail
          pnpm --filter @remote-codex/shared typecheck
          pnpm --filter @remote-codex/db typecheck
          pnpm --filter @remote-codex/codex typecheck
          pnpm --filter @remote-codex/claude typecheck
          pnpm --filter @remote-codex/supervisor-api typecheck
          pnpm --filter @remote-codex/relay-server typecheck
          pnpm --filter @remote-codex/incus-host-agent typecheck
          pnpm --filter @remote-codex/supervisor-api test
          pnpm --filter @remote-codex/incus-host-agent test
          pnpm build:package
          mkdir -p artifacts
          pnpm pack --pack-destination artifacts

      - name: Publish remote-codex
        run: npm publish "artifacts/remote-codex-${{ steps.version.outputs.version }}.tgz" --access public --provenance

      - name: Verify registry availability
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            published="$(npm view "remote-codex@${{ steps.version.outputs.version }}" version 2>/dev/null || true)"
            if [ "${published}" = "${{ steps.version.outputs.version }}" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1
