name: Staging Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to publish. Defaults to the commit SHA.
        required: false
        type: string
  push:
    branches:
      - sandbox-worker-control-plane
    paths:
      - Dockerfile.worker
      - Dockerfile.sandbox-router
      - Dockerfile.control-plane
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - apps/supervisor-api/**
      - apps/sandbox-router/**
      - apps/control-plane-api/**
      - packages/**
      - config/**
      - .github/workflows/staging-images.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: staging-images-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: "918876873590"
  EKS_CLUSTER_NAME: inact-harness-agents
  K8S_NAMESPACE: remote-codex-staging
  WORKER_ECR_REPOSITORY: remote-codex-worker-staging
  ROUTER_ECR_REPOSITORY: remote-codex-sandbox-router-staging
  RAILWAY_CONTROL_PLANE_SERVICE: remote-codex-control-plane
  RAILWAY_ENVIRONMENT: production
  ROUTER_DEPLOYMENT: remote-codex-sandbox-router
  ROUTER_CONTAINER: sandbox-router
  SUB2API_BASE_URL: https://sub.lnz-study.com
  LLM_GATEWAY_TOKEN_SECRET_NAME: remote-codex-llm-gateway-tokens
  LLM_GATEWAY_STATIC_TOKEN_SECRET_KEY: sub2api-api-key
  SANDBOX_WORKER_DEFAULT_CODEX_MODEL: gpt-5.4
  SANDBOX_WORKER_DEFAULT_REASONING_EFFORT: medium

jobs:
  build-and-push:
    name: Build and push staging images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SUB2API_STAGING_API_KEY: ${{ secrets.SUB2API_STAGING_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.image_tag }}"
          if [[ -z "${tag}" ]]; then
            tag="${GITHUB_SHA}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_STAGING_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build worker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WORKER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_IMAGE_VERSION="${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_GIT_SHA="${GITHUB_SHA}" \
            .

      - name: Smoke worker image
        run: |
          docker run -d \
            --name remote-codex-worker-staging-smoke \
            -p 127.0.0.1:18787:8787 \
            -e REMOTE_CODEX_SANDBOX_ID=sbx_verify \
            -e REMOTE_CODEX_USER_ID=user_verify \
            -e REMOTE_CODEX_WORKER_AUTH_TOKEN=router-secret \
            -e REMOTE_CODEX_ENABLED_AGENT_PROVIDERS= \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WORKER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:18787/readyz; then
              exit 0
            fi
            docker ps -a --filter name=remote-codex-worker-staging-smoke
            sleep 2
          done
          docker logs remote-codex-worker-staging-smoke
          exit 1

      - name: Stop worker smoke container
        if: always()
        run: docker rm -f remote-codex-worker-staging-smoke || true

      - name: Build sandbox router image
        run: |
          docker build \
            -f Dockerfile.sandbox-router \
            -t "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_IMAGE_VERSION="${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_GIT_SHA="${GITHUB_SHA}" \
            .

      - name: Smoke sandbox router image
        run: |
          docker run -d \
            --name remote-codex-router-staging-smoke \
            -p 127.0.0.1:18791:8791 \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18791/healthz; then
              exit 0
            fi
            docker ps -a --filter name=remote-codex-router-staging-smoke
            sleep 2
          done
          docker logs remote-codex-router-staging-smoke
          exit 1

      - name: Stop router smoke container
        if: always()
        run: docker rm -f remote-codex-router-staging-smoke || true

      - name: Push worker image
        run: |
          docker push "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WORKER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"

      - name: Require staging LLM gateway token
        if: env.SUB2API_STAGING_API_KEY == ''
        run: |
          echo "SUB2API_STAGING_API_KEY secret is required to configure the staging LLM gateway token." >&2
          exit 1

      - name: Set up Node for Railway CLI
        if: env.RAILWAY_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update Railway control-plane variables
        if: env.RAILWAY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          worker_image="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WORKER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          cors_allowed_origins="https://debug.lnz-study.com"
          npm install -g @railway/cli
          for attempt in 1 2 3; do
            if railway variable set \
              --service "${RAILWAY_CONTROL_PLANE_SERVICE}" \
              --environment "${RAILWAY_ENVIRONMENT}" \
              "SANDBOX_WORKER_IMAGE_TAG=${{ steps.image.outputs.tag }}" \
              "SANDBOX_DEFAULT_IMAGE=${worker_image}" \
              "CONTROL_PLANE_CORS_ALLOWED_ORIGINS=${cors_allowed_origins}" \
              "SANDBOX_WORKER_DEFAULT_CODEX_MODEL=${SANDBOX_WORKER_DEFAULT_CODEX_MODEL}" \
              "SANDBOX_WORKER_DEFAULT_REASONING_EFFORT=${SANDBOX_WORKER_DEFAULT_REASONING_EFFORT}" \
              "CONTROL_PLANE_BUILD_SHA=${GITHUB_SHA}" \
              "LLM_GATEWAY_PROVIDER=sub2api" \
              "LLM_GATEWAY_BASE_URL=${SUB2API_BASE_URL}" \
              "LLM_GATEWAY_TOKEN_SECRET_NAME=${LLM_GATEWAY_TOKEN_SECRET_NAME}" \
              "LLM_GATEWAY_STATIC_TOKEN_SECRET_KEY=${LLM_GATEWAY_STATIC_TOKEN_SECRET_KEY}" \
              "LLM_GATEWAY_STATIC_TOKEN=${SUB2API_STAGING_API_KEY}"; then
              break
            fi

            variables="$(railway variable list \
              --service "${RAILWAY_CONTROL_PLANE_SERVICE}" \
              --environment "${RAILWAY_ENVIRONMENT}" \
              --kv || true)"
            if grep -qx "SANDBOX_WORKER_IMAGE_TAG=${{ steps.image.outputs.tag }}" <<<"${variables}" &&
              grep -qx "SANDBOX_DEFAULT_IMAGE=${worker_image}" <<<"${variables}" &&
              grep -qx "CONTROL_PLANE_CORS_ALLOWED_ORIGINS=${cors_allowed_origins}" <<<"${variables}" &&
              grep -qx "SANDBOX_WORKER_DEFAULT_CODEX_MODEL=${SANDBOX_WORKER_DEFAULT_CODEX_MODEL}" <<<"${variables}" &&
              grep -qx "SANDBOX_WORKER_DEFAULT_REASONING_EFFORT=${SANDBOX_WORKER_DEFAULT_REASONING_EFFORT}" <<<"${variables}" &&
              grep -qx "CONTROL_PLANE_BUILD_SHA=${GITHUB_SHA}" <<<"${variables}" &&
              grep -qx "LLM_GATEWAY_PROVIDER=sub2api" <<<"${variables}" &&
              grep -qx "LLM_GATEWAY_BASE_URL=${SUB2API_BASE_URL}" <<<"${variables}" &&
              grep -qx "LLM_GATEWAY_TOKEN_SECRET_NAME=${LLM_GATEWAY_TOKEN_SECRET_NAME}" <<<"${variables}" &&
              grep -qx "LLM_GATEWAY_STATIC_TOKEN_SECRET_KEY=${LLM_GATEWAY_STATIC_TOKEN_SECRET_KEY}" <<<"${variables}"; then
              echo "Railway variables match desired control-plane values after a failed set attempt."
              break
            fi

            if [[ "${attempt}" == "3" ]]; then
              echo "Railway control-plane variables were not updated after ${attempt} attempts." >&2
              exit 1
            fi

            sleep $((attempt * 10))
          done
          railway up \
            --service "${RAILWAY_CONTROL_PLANE_SERVICE}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --ci \
            --message "staging control-plane ${GITHUB_SHA}"

      - name: Skip Railway worker image tag update
        if: env.RAILWAY_TOKEN == ''
        run: |
          echo "RAILWAY_TOKEN secret is not configured; skipped Railway worker image tag update."

      - name: Push sandbox router image
        run: |
          docker push "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"

      - name: Set up kubectl for router deploy
        uses: azure/setup-kubectl@v4

      - name: Deploy sandbox router to EKS
        shell: bash
        run: |
          set -euo pipefail
          router_image="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}" \
            --alias remote-codex-staging
          kubectl -n "${K8S_NAMESPACE}" set image \
            "deployment/${ROUTER_DEPLOYMENT}" \
            "${ROUTER_CONTAINER}=${router_image}"
          kubectl -n "${K8S_NAMESPACE}" rollout status \
            "deployment/${ROUTER_DEPLOYMENT}" \
            --timeout=5m
          kubectl -n "${K8S_NAMESPACE}" get deployment "${ROUTER_DEPLOYMENT}" \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="sandbox-router")].image}{"\n"}'

      - name: Fetch recent control-plane error logs
        if: always() && env.RAILWAY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @railway/cli
          railway logs \
            --service "${RAILWAY_CONTROL_PLANE_SERVICE}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --latest \
            --lines 120 \
            --json || true
          railway logs \
            --service "${RAILWAY_CONTROL_PLANE_SERVICE}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --http \
            --status "500..599" \
            --since 30m \
            --json || true
