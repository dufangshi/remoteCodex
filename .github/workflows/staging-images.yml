name: Staging Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to publish. Defaults to the commit SHA.
        required: false
        type: string
  push:
    branches:
      - sandbox-worker-control-plane
    paths:
      - Dockerfile.worker
      - Dockerfile.sandbox-router
      - Dockerfile.control-plane
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - apps/supervisor-api/**
      - apps/sandbox-router/**
      - apps/control-plane-api/**
      - packages/**
      - config/**
      - .github/workflows/staging-images.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: staging-images-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: "918876873590"
  EKS_CLUSTER_NAME: inact-harness-agents
  K8S_NAMESPACE: remote-codex-staging
  WORKER_ECR_REPOSITORY: remote-codex-worker-staging
  ROUTER_ECR_REPOSITORY: remote-codex-sandbox-router-staging
  ROUTER_DEPLOYMENT: remote-codex-sandbox-router
  ROUTER_CONTAINER: sandbox-router

jobs:
  build-and-push:
    name: Build and push staging images
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.image_tag }}"
          if [[ -z "${tag}" ]]; then
            tag="${GITHUB_SHA}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_STAGING_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build worker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WORKER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_IMAGE_VERSION="${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_GIT_SHA="${GITHUB_SHA}" \
            .

      - name: Smoke worker image
        run: |
          docker run -d \
            --name remote-codex-worker-staging-smoke \
            -p 127.0.0.1:18787:8787 \
            -e REMOTE_CODEX_SANDBOX_ID=sbx_verify \
            -e REMOTE_CODEX_USER_ID=user_verify \
            -e REMOTE_CODEX_WORKER_AUTH_TOKEN=router-secret \
            -e REMOTE_CODEX_ENABLED_AGENT_PROVIDERS= \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WORKER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:18787/readyz; then
              exit 0
            fi
            docker ps -a --filter name=remote-codex-worker-staging-smoke
            sleep 2
          done
          docker logs remote-codex-worker-staging-smoke
          exit 1

      - name: Stop worker smoke container
        if: always()
        run: docker rm -f remote-codex-worker-staging-smoke || true

      - name: Build sandbox router image
        run: |
          docker build \
            -f Dockerfile.sandbox-router \
            -t "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_IMAGE_VERSION="${{ steps.image.outputs.tag }}" \
            --build-arg REMOTE_CODEX_GIT_SHA="${GITHUB_SHA}" \
            .

      - name: Smoke sandbox router image
        run: |
          docker run -d \
            --name remote-codex-router-staging-smoke \
            -p 127.0.0.1:18791:8791 \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18791/healthz; then
              exit 0
            fi
            docker ps -a --filter name=remote-codex-router-staging-smoke
            sleep 2
          done
          docker logs remote-codex-router-staging-smoke
          exit 1

      - name: Stop router smoke container
        if: always()
        run: docker rm -f remote-codex-router-staging-smoke || true

      - name: Push worker image
        run: |
          docker push "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WORKER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"

      - name: Push sandbox router image
        run: |
          docker push "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy sandbox router to EKS
        shell: bash
        run: |
          set -euo pipefail
          router_image="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}" \
            --alias remote-codex-staging
          kubectl -n "${K8S_NAMESPACE}" set image \
            "deployment/${ROUTER_DEPLOYMENT}" \
            "${ROUTER_CONTAINER}=${router_image}"
          kubectl -n "${K8S_NAMESPACE}" rollout status \
            "deployment/${ROUTER_DEPLOYMENT}" \
            --timeout=5m
          kubectl -n "${K8S_NAMESPACE}" get deployment "${ROUTER_DEPLOYMENT}" \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="sandbox-router")].image}{"\n"}'
