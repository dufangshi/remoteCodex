name: Worker Image

on:
  pull_request:
    paths:
      - Dockerfile.worker
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - apps/supervisor-api/**
      - packages/**
      - config/**
      - .github/workflows/worker-image.yml
  push:
    branches:
      - main
      - sandbox-worker-control-plane
    paths:
      - Dockerfile.worker
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - apps/supervisor-api/**
      - packages/**
      - config/**
      - .github/workflows/worker-image.yml

permissions:
  contents: read

concurrency:
  group: worker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    name: Build and smoke worker image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build worker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t remote-codex-worker:verify \
            --build-arg REMOTE_CODEX_IMAGE_VERSION=ci-${GITHUB_RUN_ID} \
            --build-arg REMOTE_CODEX_GIT_SHA=${GITHUB_SHA} \
            .

      - name: Start worker container
        run: |
          docker run -d \
            --name remote-codex-worker-verify-smoke \
            -p 127.0.0.1:18787:8787 \
            -e REMOTE_CODEX_SANDBOX_ID=sbx_verify \
            -e REMOTE_CODEX_USER_ID=user_verify \
            -e REMOTE_CODEX_WORKER_AUTH_TOKEN=router-secret \
            -e REMOTE_CODEX_ENABLED_AGENT_PROVIDERS= \
            remote-codex-worker:verify

      - name: Verify readiness
        run: |
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:18787/readyz; then
              exit 0
            fi
            docker ps -a --filter name=remote-codex-worker-verify-smoke
            sleep 2
          done
          docker logs remote-codex-worker-verify-smoke
          exit 1

      - name: Verify worker auth denial
        run: |
          status="$(curl -sS -o /tmp/worker-denied.json -w '%{http_code}' \
            http://127.0.0.1:18787/api/worker/metadata)"
          cat /tmp/worker-denied.json
          test "${status}" = "401"

      - name: Verify worker auth success
        run: |
          curl -fsS \
            -H 'x-remote-codex-worker-token: router-secret' \
            http://127.0.0.1:18787/api/worker/metadata

      - name: Dump worker logs
        if: always()
        run: docker logs remote-codex-worker-verify-smoke || true

      - name: Stop worker container
        if: always()
        run: docker rm -f remote-codex-worker-verify-smoke || true
