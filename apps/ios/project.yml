name: RemoteCodex
options:
  bundleIdPrefix: com.remotecodex
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  RemoteCodex:
    type: application
    platform: iOS
    sources:
      - RemoteCodex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotecodex.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Remote Codex
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  RemoteCodexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RemoteCodexTests
    dependencies:
      - target: RemoteCodex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotecodex.ios.tests
        GENERATE_INFOPLIST_FILE: YES
  RemoteCodexUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - RemoteCodexUITests
    dependencies:
      - target: RemoteCodex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotecodex.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
